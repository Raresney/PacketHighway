<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PacketHighway</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">&#128678;</span>
      <h1>PACKET<span>HIGHWAY</span></h1>
      <span id="mode" class="badge">connecting&hellip;</span>
    </div>
    <div class="stats">
      <div class="stat"><b id="pps">0</b><label>pkt/s</label></div>
      <div class="stat"><b id="bw">0</b><label>kbit/s</label></div>
      <div class="stat"><b id="cars">0</b><label>cars</label></div>
      <div class="stat"><b id="total">0</b><label>total</label></div>
      <button id="pause" title="pause / resume">&#10074;&#10074;</button>
    </div>
  </header>

  <div id="legend"></div>

  <div id="roadwrap">
    <canvas id="road"></canvas>
    <div id="tooltip"></div>
    <div class="sign sign-in">&#11013; INBOUND</div>
    <div class="sign sign-out">OUTBOUND &#10145;</div>
  </div>

  <footer>
    hover a vehicle for packet details &middot; click a legend chip to filter a
    protocol &middot; vehicle size = packet size (motorcycle &lt; car &lt; van
    &lt; truck)
  </footer>

<script src="app.js"></script>
</body>
</html>
