<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>
    <linearGradient id="carG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#56d364"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="carB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="carO" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffa657"/>
      <stop offset="1" stop-color="#e3702a"/>
    </linearGradient>
    <clipPath id="icon">
      <rect x="24" y="20" width="140" height="140" rx="20"/>
    </clipPath>
  </defs>

  <rect width="640" height="180" rx="20" fill="url(#sky)" stroke="#1f2630" stroke-width="2"/>

  <!-- icon: vertical road with packet-cars -->
  <g clip-path="url(#icon)">
    <rect x="24" y="20" width="140" height="140" fill="#11161d"/>
    <rect x="59" y="20" width="70" height="140" fill="#1c2128"/>
    <line x1="62" y1="20" x2="62" y2="160" stroke="#c9d1d9" stroke-width="2.5"/>
    <line x1="126" y1="20" x2="126" y2="160" stroke="#c9d1d9" stroke-width="2.5"/>
    <line x1="94" y1="20" x2="94" y2="160" stroke="#8b9496" stroke-width="2.5"
          stroke-dasharray="10 9" opacity="0.75"/>

    <!-- green car going up -->
    <g>
      <rect x="68" y="92" width="20" height="36" rx="6" fill="url(#carG)"/>
      <rect x="71" y="100" width="14" height="13" rx="3" fill="#0d1117" opacity="0.6"/>
      <circle cx="72.5" cy="94.5" r="1.8" fill="#fff4c8"/>
      <circle cx="83.5" cy="94.5" r="1.8" fill="#fff4c8"/>
    </g>
    <!-- blue car going up, ahead -->
    <g>
      <rect x="100" y="34" width="20" height="36" rx="6" fill="url(#carB)"/>
      <rect x="103" y="42" width="14" height="13" rx="3" fill="#0d1117" opacity="0.6"/>
      <circle cx="104.5" cy="36.5" r="1.8" fill="#fff4c8"/>
      <circle cx="115.5" cy="36.5" r="1.8" fill="#fff4c8"/>
    </g>
    <!-- orange car going down -->
    <g>
      <rect x="100" y="106" width="18" height="30" rx="5" fill="url(#carO)"/>
      <rect x="103" y="118" width="12" height="11" rx="3" fill="#0d1117" opacity="0.6"/>
      <circle cx="104" cy="133.5" r="1.8" fill="#fff4c8"/>
      <circle cx="114" cy="133.5" r="1.8" fill="#fff4c8"/>
    </g>
  </g>
  <rect x="24" y="20" width="140" height="140" rx="20" fill="none"
        stroke="#2a3340" stroke-width="2.5"/>

  <!-- wordmark -->
  <text x="196" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="40"
        font-weight="800" letter-spacing="3" fill="#e6edf3">PACKET<tspan
        fill="#58a6ff">HIGHWAY</tspan></text>

  <circle cx="201" cy="116" r="4" fill="#f85149"/>
  <circle cx="214" cy="116" r="4" fill="#d29922"/>
  <circle cx="227" cy="116" r="4" fill="#3fb950"/>
  <text x="240" y="121" font-family="Segoe UI, Arial, sans-serif" font-size="15"
        letter-spacing="3" fill="#7d8896">LIVE NETWORK TRAFFIC VISUALIZER</text>
</svg>
